{{- if .Values.webhook.certManager.enabled }}
# cert-manager Certificate for the webhook TLS.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "pulse.fullname" . }}-webhook-cert
  namespace: {{ include "pulse.namespace" . }}
  labels:
    {{- include "pulse.labels" . | nindent 4 }}
spec:
  secretName: {{ include "pulse.fullname" . }}-webhook-cert
  dnsNames:
    - {{ include "pulse.fullname" . }}-webhook-service.{{ include "pulse.namespace" . }}.svc
    - {{ include "pulse.fullname" . }}-webhook-service.{{ include "pulse.namespace" . }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.webhook.certManager.issuerName }}
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.webhook.certManager.issuerName }}
spec:
  selfSigned: {}
{{- end }}
