apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pulse-operator-role
  labels:
    app.kubernetes.io/name: pulse-operator
    app.kubernetes.io/managed-by: pulse
rules:
  # Core API — namespaces (label for injection), configmaps (pricing), pods (count injected)
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch]

  # Pulse CRDs
  - apiGroups: [pulse.velorai.com]
    resources: [llmbackends, pulseconfigs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [pulse.velorai.com]
    resources: [llmbackends/status, pulseconfigs/status]
    verbs: [get, update, patch]
  - apiGroups: [pulse.velorai.com]
    resources: [llmbackends/finalizers]
    verbs: [update]

  # Prometheus Operator — ServiceMonitor, PrometheusRule
  - apiGroups: [monitoring.coreos.com]
    resources: [servicemonitors, prometheusrules]
    verbs: [get, list, watch, create, update, patch, delete]

  # Grafana Operator — GrafanaDashboard
  - apiGroups: [grafana.integreatly.org]
    resources: [grafanadashboards]
    verbs: [get, list, watch, create, update, patch, delete]

  # Gateway API — HTTPRoute, RateLimitPolicy (Iteration 1)
  - apiGroups: [gateway.networking.k8s.io]
    resources: [httproutes]
    verbs: [get, list, watch, create, update, patch, delete]

  # Leader election
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]

  # Events
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pulse-operator-rolebinding
  labels:
    app.kubernetes.io/name: pulse-operator
    app.kubernetes.io/managed-by: pulse
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pulse-operator-role
subjects:
  - kind: ServiceAccount
    name: pulse-operator
    namespace: pulse-system
